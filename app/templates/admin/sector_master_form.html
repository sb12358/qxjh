{% extends "base.html" %}
{% block title %}编辑板块 - QXJH{% endblock %}
{% block content %}
<section class="page-head">
  <h2>编辑板块</h2>
</section>

<form method="post" class="panel form-grid">
  <div class="field">
    <label>板块名称 *</label>
    <input type="text" name="name" required value="{{ item.name }}" />
  </div>

  <div class="action-row">
    <button class="btn btn-primary" type="submit">保存</button>
    <a class="btn btn-secondary" href="{{ url_for('admin.sector_masters') }}">返回列表</a>
  </div>
</form>
{% endblock %}
