{% extends "base.html" %}
{% block title %}板块维护 - QXJH{% endblock %}
{% block content %}
<section class="page-head">
  <h2>板块维护</h2>
  <p>维护板块主数据（仅板块名称）。</p>
</section>

<form method="post" class="panel form-grid">
  <div class="field">
    <label>板块名称 *</label>
    <input type="text" name="name" required placeholder="例如：黑色" />
  </div>
  <div class="action-row">
    <button class="btn btn-primary" type="submit">新增板块</button>
  </div>
</form>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>板块名称</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      {% for item in items %}
      <tr>
        <td>{{ item.id }}</td>
        <td>{{ item.name }}</td>
        <td>
          <div class="action-row">
            <a class="btn btn-ghost" href="{{ url_for('admin.edit_sector_master', item_id=item.id) }}">编辑</a>
            <form method="post" action="{{ url_for('admin.delete_sector_master', item_id=item.id) }}" onsubmit="return confirm('确认删除该记录？')">
              <button class="btn btn-danger" type="submit">删除</button>
            </form>
          </div>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3">暂无数据</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
