{% extends "base.html" %}
{% block title %}编辑策略 - QXJH{% endblock %}
{% block content %}
<section class="page-head">
  <h2>编辑策略</h2>
</section>

<form method="post" class="panel form-grid">
  <div class="field">
    <label>策略号 *</label>
    <input type="text" name="strategy_no" required value="{{ item.strategy_no }}" />
  </div>

  <div class="action-row">
    <button class="btn btn-primary" type="submit">保存</button>
    <a class="btn btn-secondary" href="{{ url_for('admin.strategy_masters') }}">返回列表</a>
  </div>
</form>
{% endblock %}
